data:
  dataset_path: dataset.csv
  date_column: date

target:
  column: revenue
  type: revenue

dimensions:
  panel:
    - geo
    - brand

media:
  channels:
    - channel_1
    - channel_2
    - channel_3
    - channel_4
    - channel_5
    - channel_6
  adstock:
    type: geometric
    l_max: 4
    priors:
      alpha:
        distribution: Beta
        alpha: 1
        beta: 3
        dims: ["geo", "brand", "channel"]
  saturation:
    type: logistic
    priors:
      lam:
        distribution: Gamma
        alpha: 3
        beta: 1
        dims: ["channel"]
      beta:
        distribution: HalfNormal
        sigma: 1
        dims: ["geo", "brand", "channel"]

effects:
  - type: yearly_fourier
    order: 2
    prefix: yearly_fourier

priors:
  intercept:
    distribution: Normal
    mu: 0
    sigma: 2
    dims: ["geo", "brand"]
  likelihood:
    distribution: Normal
    sigma:
      distribution: HalfNormal
      sigma: 2
      dims: ["geo", "brand"]
    dims: ["date", "geo", "brand"]

fit:
  tune: 2000
  draws: 3000
  chains: 4
  cores: 2
  random_seed: 42
  target_accept: 0.85
  progressbar: false
  compute_convergence_checks: false

holidays:
  mode: prophet_component
  path: ../holidays.csv
  countries: [UK, FR, DE]

validation:
  enabled: true
  holdout_observations: 8
  include_last_observations: true
  coverage_levels: [0.5, 0.8, 0.94]
  sampler:
    draws: 500
    tune: 500
    chains: 2
    cores: 2
    random_seed: 42

optimization:
  start_date: "2024-11-11"
  end_date: "2025-01-27"
  budget:
    mode: relative
    value: 1.1
    basis: reference_window_total

original_scale_vars:
  - channel_contribution
  - y
