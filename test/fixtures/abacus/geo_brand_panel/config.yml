data:
  dataset_path: dataset.csv
  date_column: date

target:
  column: revenue
  type: revenue

dimensions:
  panel:
    - geo
    - brand

media:
  channels:
    - channel_1
    - channel_2
    - channel_3
    - channel_4
    - channel_5
    - channel_6
  adstock:
    type: geometric
    l_max: 4
    priors:
      # alpha controls carryover/decay. Higher values imply a longer memory of
      # past spend; Beta(1, 3) is weakly informative and favors shorter carryover.
      alpha:
        distribution: Beta
        alpha: 1
        beta: 3
        dims: ["geo", "brand", "channel"]
  saturation:
    type: logistic
    priors:
      # lam controls how quickly the response curve bends toward saturation.
      # Larger values imply faster saturation at lower scaled spend levels.
      lam:
        distribution: Gamma
        alpha: 3
        beta: 1
        dims: ["channel"]
      # beta controls the channel contribution amplitude on the model's scaled
      # target space after the logistic saturation transform has been applied.
      beta:
        distribution: HalfNormal
        sigma: 1
        dims: ["geo", "brand", "channel"]

effects:
  # A low-order annual Fourier term captures recurring yearly seasonality.
  - type: yearly_fourier
    order: 2
    prefix: yearly_fourier

priors:
  # intercept is the baseline level of the target not explained by media or
  # other additive effects, on the model's scaled target space.
  intercept:
    distribution: Normal
    mu: 0
    sigma: 2
    dims: ["geo", "brand"]
  # likelihood.sigma controls residual observation noise around the model mean.
  likelihood:
    distribution: Normal
    sigma:
      distribution: HalfNormal
      sigma: 2
      dims: ["geo", "brand"]
    dims: ["date", "geo", "brand"]

fit:
  tune: 2000
  draws: 3000
  chains: 4
  cores: 2
  random_seed: 42
  target_accept: 0.85
  progressbar: false
  compute_convergence_checks: false

holidays:
  # Fit one Prophet-derived holiday component per geo-brand series instead of
  # estimating one latent parameter per holiday row.
  mode: prophet_component
  path: ../../holidays.csv
  countries: [UK, FR, DE]

validation:
  # Stage 35 is a blocked tail holdout: refit on the earlier dates, then score
  # only the final holdout_observations dates out of sample.
  enabled: true
  # With weekly data, 8 weeks is a pragmatic default: long enough to expose
  # forecast drift while still leaving useful training history.
  holdout_observations: 8
  # Preserve trailing lag history so adstock carryover is scored correctly on
  # the holdout window.
  include_last_observations: true
  # Stage 35 reports coverage_50, coverage_80, and coverage_94 from these
  # interval probabilities.
  coverage_levels: [0.5, 0.8, 0.94]
  sampler:
    # Stage 35 performs a second fit. Use a lighter sampler here unless
    # holdout precision matters more than runtime.
    draws: 500
    tune: 500
    chains: 2
    cores: 2
    random_seed: 42

ai_advisor:
  enabled: true
  provider: openrouter
  mode: autopilot
  privacy: anonymized_relative
  approval: file_based
  write_outputs: true
  llm_enabled: true
  openrouter_model: openai/gpt-5.2
  openrouter_timeout_seconds: 90

optimization:
  start_date: "2024-11-11"
  end_date: "2025-01-27"
  budget:
    # Prefer an interpretable budget spec over a hard-coded raw amount.
    # `relative` resolves against the reference-window total spend.
    mode: relative
    # 1.10 means plan 110% of the reference-window total over the full
    # optimization horizon, not 110% per week.
    value: 1.1
    # The reference window is the same historical window Stage 70 already uses
    # for current-plan comparison and bound derivation.
    basis: reference_window_total

original_scale_vars:
  - channel_contribution
  - y
